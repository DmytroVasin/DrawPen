<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Extended Toolbar</title>
    <style>
      :root {
        --toolbar-window-margin: 10px; /* Matches with EXTENDED_TOOLBAR_WINDOW_MARGIN */

        --toolbar-background-color: #FFFFFF;
        --toolbar-border-color: #020202;
        --toolbar-height: 44px;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
      }

      button {
        background: none;
        border: none;
        padding: 0;
      }

      button:focus {
        outline: none;
      }

      button svg {
        pointer-events: none;
      }

      .toolbar__mode-switcher {
        -webkit-app-region: drag;
      }

      .toolbar__close,
      .toolbar__main-button {
        -webkit-app-region: no-drag;  /* overlaps switcher */
      }

      .toolbar-extended {
        position: absolute;
        top: var(--toolbar-window-margin);
        left: var(--toolbar-window-margin);
      }

      #toolbar {
        display: flex;
      }

      .toolbar__close {
        position: absolute;
        top: -5px;
        left: -5px;
        z-index: 1;
        background-color: var(--toolbar-background-color);
        border: 1px solid var(--toolbar-border-color);
        border-radius: 15px;
      }

      .toolbar__close button {
        display: flex;
        padding: 2px;
        justify-content: center;
        align-items: center;
      }

      .toolbar__close svg {
        width: 12px;
        height: 12px;
      }

      .toolbar__mode-switcher {
        display: flex;
        background-color: var(--toolbar-background-color);
        border-radius: 10px;
        border: 1px solid var(--toolbar-border-color);
      }

      .toolbar__main-button {
        display: flex;
        padding: 10px 0;
      }

      .toolbar__main-button button {
        display: flex;
        align-self: center;
        cursor: pointer;
      }

      .toolbar__main-button svg {
        width: 50px;
        height: 50px;
      }

      .toolbar__draglines {
        display: flex;
        padding: 0 4px;
        align-items: center;
      }

      .draglines {
        display: grid;
        row-gap: 2px;
        column-gap: 2px;
        grid-template-columns: repeat(2, min-content);
      }

      .draglines div {
        width: 2px;
        height: 2px;
        border-radius: 50%;
        background-color: var(--toolbar-border-color);
      }

      .toolbar__slider {
        height: var(--toolbar-height);
        display: flex;
        align-self: center;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        border: 1px solid var(--toolbar-border-color);
        border-top-right-radius: 10px;
        border-bottom-right-radius: 10px;
        background-color: var(--toolbar-background-color);
        cursor: pointer;
        border-left: 0;
      }

      .toolbar__slider svg {
        width: 16px;
        height: 16px;
      }
    </style>
  </head>

  <body>
    <aside id="toolbar" class="toolbar-extended">
      <div class="toolbar__mode-switcher">
        <div class="toolbar__draglines">
          <div class="draglines">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
          </div>
        </div>

        <div class="toolbar__main-button">
          <button tabindex="-1" title="Draw Mode">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
              <path d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z"></path>
            </svg>
          </button>
        </div>

        <div class="toolbar__draglines">
          <div class="draglines">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
          </div>
        </div>
      </div>

      <div class="toolbar__slider">
        <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 256 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg">
          <path d="M224.3 273l-136 136c-9.4 9.4-24.6 9.4-33.9 0l-22.6-22.6c-9.4-9.4-9.4-24.6 0-33.9l96.4-96.4-96.4-96.4c-9.4-9.4-9.4-24.6 0-33.9L54.3 103c9.4-9.4 24.6-9.4 33.9 0l136 136c9.5 9.4 9.5 24.6.1 34z"></path>
        </svg>
      </div>

      <div class="toolbar__close">
        <button tabindex="-1">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"></path>
          </svg>
        </button>
      </div>
    </aside>
  </body>
</html>
